# Lightweight Docker Compose for Keycloak and its database

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.3.1 # Keycloak identity provider image
    container_name: keycloak
    command: start-dev # run Keycloak in development mode
    environment:
      KC_DB: postgres # use Postgres as the Keycloak database
      KC_DB_URL_HOST: db # host name of the Postgres container
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KEYCLOAK_ADMIN: admin # admin username for Keycloak
      KEYCLOAK_ADMIN_PASSWORD: admin # admin password for Keycloak
    ports:
      - "9090:8080" # expose Keycloak admin UI
    depends_on:
      - db # start the DB before Keycloak

  db:
    image: postgres:15 # Postgres DB used by Keycloak
    container_name: keycloak-db
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - postgres_data:/var/lib/postgresql/data # persist Keycloak user data

volumes:
  postgres_data: # named volume for Postgres persistence
