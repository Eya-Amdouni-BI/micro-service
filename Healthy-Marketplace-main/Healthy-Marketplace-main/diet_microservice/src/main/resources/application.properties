# Proprietes locales de secours du microservice DIETSERVICE.
# Charge la configuration depuis le Config Server si celui-ci est disponible.
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8889}

# Nom utilise par Spring Cloud, Eureka et le Config Server pour identifier le service.
spring.application.name=DIETSERVICE

# Port HTTP local du microservice Diet.
server.port=8008

# Active les logs de debug du client Spring Cloud Config pour diagnostiquer le chargement distant.
logging.level.org.springframework.cloud.config.client=DEBUG
