# Delivery service runtime properties stored in Spring Cloud Config
# This file configures the delivery microservice and its MongoDB connection.
server.port=3000
# MongoDB connection string pointing at the named Docker Compose service
spring.data.mongodb.uri=mongodb://delivery-db:27017/delivery_db

# Eureka discovery settings for the delivery service
eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.hostname=delivery-service
# Unique Eureka instance ID that includes the service port
eureka.instance.instanceId=delivery-service:${server.port}
