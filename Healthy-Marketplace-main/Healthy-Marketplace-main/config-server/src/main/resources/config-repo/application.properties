# Default values served by Config Server to services that have no own config file.
# These settings are useful as a base template for services during local development.
# Individual services can override any of these values in their own config files.

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/} # Eureka server endpoint for service registration and discovery

eureka.client.register-with-eureka=true # allow services using this default profile to register with Eureka

eureka.client.fetch-registry=true # enable clients to fetch Eureka registry entries

eureka.instance.prefer-ip-address=true # prefer container IP addresses over hostnames when registering

# Keycloak JWT validation defaults for resource server services
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/healthy-market-realm
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8080}/realms/healthy-market-realm/protocol/openid-connect/certs

# JPA defaults useful for development and auto schema updates
spring.jpa.show-sql=true # log SQL statements to the console
spring.jpa.hibernate.ddl-auto=update # automatically update schema based on entities during startup