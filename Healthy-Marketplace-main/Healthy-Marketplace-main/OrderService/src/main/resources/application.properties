# OrderService local config file with fallback values
# If available, this service imports config from the Config Server.
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8889}

# Local fallback values when config server is unavailable
spring.application.name=OrderService
server.port=8082

# Enable debug logging for the Spring Cloud Config client
logging.level.org.springframework.cloud.config.client=DEBUG
# Enable verbose config client logs during startup

eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/
# Point this service to Eureka for service discovery
