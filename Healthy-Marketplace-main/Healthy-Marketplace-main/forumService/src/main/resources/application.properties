# ForumService fallback configuration when Config Server is not reachable
# This local file still enables Eureka discovery and Cloud Config client debug logging.
# ForumService local fallback properties if Config Server is unavailable
spring.config.import=optional:configserver:${CONFIG_SERVER_URL:http://localhost:8889}

spring.application.name=ForumService
server.port=8006

# Enable debug logging for the Cloud Config client
logging.level.org.springframework.cloud.config.client=DEBUG
