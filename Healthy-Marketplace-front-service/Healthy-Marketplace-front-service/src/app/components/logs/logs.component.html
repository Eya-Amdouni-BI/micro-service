<div class="px-6 py-6">
  <div class="mb-6 flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-semibold text-gray-900">Live Service Logs</h1>
      <p class="text-sm text-gray-500">Logs are streamed from RabbitMQ in real time.</p>
    </div>
    <span class="text-sm text-green-600">{{ status }}</span>
  </div>

  <div class="overflow-x-auto rounded-3xl border border-gray-200 bg-white shadow-sm">
    <table class="min-w-full divide-y divide-gray-200 text-sm">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Time</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Service</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Level</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Message</th>
          <th class="px-4 py-3 text-left font-semibold text-gray-600">Meta</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-100">
        <tr *ngFor="let log of logs">
          <td class="px-4 py-3 whitespace-nowrap text-gray-700">{{ log.timestamp | date:'short' }}</td>
          <td class="px-4 py-3 whitespace-nowrap text-gray-700">{{ log.service }}</td>
          <td class="px-4 py-3 whitespace-nowrap text-gray-700">{{ log.level }}</td>
          <td class="px-4 py-3 text-gray-700">{{ log.message }}</td>
          <td class="px-4 py-3 text-gray-700">
            <pre class="whitespace-pre-wrap break-words text-xs text-gray-500">{{ log.meta | json }}</pre>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
