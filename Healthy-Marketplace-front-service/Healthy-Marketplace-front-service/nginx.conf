# Nginx configuration for serving the Angular frontend as a static single-page application
server {
    listen 80; # listen on HTTP port 80
    server_name localhost;

    location / {
        root /usr/share/nginx/html; # static files built by Angular in the container
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # fallback to index.html for Angular routes
    }
}
